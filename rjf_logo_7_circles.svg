<svg width="400" height="240" viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
<title>Replication Journal Federation logo — 7 journals</title>
<desc>A flat diamond with seven interlocking colored circles.</desc>

<defs>
<style>
.ring { fill: none; stroke-width: 2.6; stroke-linecap: round; }
.dm { fill: none; stroke-width: 2.2; stroke-linejoin: round; stroke: #2980B9; }
.dm-bg { opacity: 0.08; fill: #2980B9; }
.c1 { stroke: #1B6B93; } .c2 { stroke: #2E8B57; } .c3 { stroke: #C0392B; }
.c4 { stroke: #D4A017; } .c5 { stroke: #7D3C98; } .c6 { stroke: #E67E22; }
.c7 { stroke: #16A085; }
</style>
<clipPath id="d7-in"><polygon points="200,20 280,100 200,180 120,100"/></clipPath>
<clipPath id="d7-out"><path d="M0,0H400V240H0Z M200,20L120,100 200,180 280,100Z" clip-rule="evenodd"/></clipPath>
</defs>

<polygon class="dm-bg" points="200,20 280,100 200,180 120,100"/>
<polygon class="dm" points="200,20 280,100 200,180 120,100"/>

<g clip-path="url(#d7-out)">
  <circle class="ring c1" cx="200" cy="13" r="30"/>
  <circle class="ring c2" cx="268" cy="40" r="30"/>
  <circle class="ring c3" cx="286" cy="110" r="30"/>
  <circle class="ring c4" cx="238" cy="176" r="30"/>
  <circle class="ring c5" cx="162" cy="176" r="30"/>
  <circle class="ring c6" cx="114" cy="110" r="30"/>
  <circle class="ring c7" cx="132" cy="40" r="30"/>
</g>

<g clip-path="url(#d7-in)">
  <circle class="ring c1" cx="200" cy="13" r="30"/>
  <circle class="ring c2" cx="268" cy="40" r="30"/>
  <circle class="ring c3" cx="286" cy="110" r="30"/>
  <circle class="ring c4" cx="238" cy="176" r="30"/>
  <circle class="ring c5" cx="162" cy="176" r="30"/>
  <circle class="ring c6" cx="114" cy="110" r="30"/>
  <circle class="ring c7" cx="132" cy="40" r="30"/>
</g>

</svg>
