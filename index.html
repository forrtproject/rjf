<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replication Journal Federation</title>
    <!-- Import elegant serif (FORRT style) and clean sans-serif (grid style) -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,700;1,300&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Theme Variables */
            --bg-primary: #ffffff;
            --bg-secondary: #f4f5f5;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --nav-bg: #333333;
            --nav-text: #ffffff;
            --border-color: #d1d5db;
            --accent-color: #2b593f; /* Dark green from first image inspiration */
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --nav-bg: #000000;
            --nav-text: #ffffff;
            --border-color: #333333;
            --accent-color: #4ade80;
            --card-bg: #1e1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* FORRT-style Dark Navigation */
        nav {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Merriweather', serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Dark Mode Toggle Button */
        #theme-toggle {
            background: none;
            border: 1px solid var(--nav-text);
            color: var(--nav-text);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }
        
        #theme-toggle:hover {
            background-color: var(--nav-text);
            color: var(--nav-bg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Hero Section mimicking FORRT vertical split layout */
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 0;
            border-bottom: 2px solid var(--border-color);
        }

        .hero-left {
            flex: 1;
            text-align: right;
            padding-right: 3rem;
        }

        .hero-left h1 {
            font-family: 'Merriweather', serif;
            font-size: 3.5rem;
            font-weight: 300;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .hero-divider {
            width: 2px;
            height: 150px;
            background-color: var(--text-primary);
        }

        .hero-right {
            flex: 1;
            padding-left: 3rem;
        }

        .hero-right h2 {
            font-family: 'Merriweather', serif;
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Structured Sections (First Picture Inspiration) */
        section {
            border-bottom: 2px solid var(--border-color);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
        }

        .section-label {
            padding: 3rem 2rem 3rem 0;
            border-right: 2px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        .section-content {
            padding: 3rem 0 3rem 3rem;
        }

        /* Announcements Carousel */
        .carousel-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .carousel-slide {
            display: none;
            animation: fadeIn 0.5s;
        }

        .carousel-slide.active {
            display: block;
        }

        .slide-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
